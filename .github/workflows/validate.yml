name: Validate skill pack

on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.12"
          - os: macos-latest
            python: "3.12"
          - os: windows-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install validation dependencies
        run: python -m pip install -e '.[dev]'
      - name: Validate repository
        run: python scripts/validate_repo.py --strict
      - name: Verify generated bundles are current
        shell: bash
        run: |
          python scripts/build_skills.py --clean
          git diff --exit-code
          status="$(git status --porcelain --untracked-files=all -- \
            ':(glob)vibio*/references/**' \
            ':(glob)vibio*/scripts/**' \
            ':(glob)vibio*/schemas/**')"
          if [ -n "$status" ]; then
            echo "$status"
            echo "Generated Skill bundles include uncommitted or untracked files." >&2
            exit 1
          fi
      - name: Run tests
        run: pytest -q
      - name: Run offline contract evaluations
        run: python scripts/eval_runner.py --strict
      - name: Check patch whitespace
        run: git show --check --format= HEAD
